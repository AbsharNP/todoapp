<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow – Diagram Editor</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/diagram.css">
</head>
<body class="diagram-page">

  <!-- ── Top Bar ──────────────────────────────────────────── -->
  <header class="diagram-header">
    <div class="diagram-header-left">
      <a href="dashboard.html" class="btn btn-ghost btn-sm" style="gap:6px">← Back</a>
      <div class="divider" style="width:1px;height:20px;margin:0 4px"></div>
      <input type="text" id="diagram-name" class="diagram-name-input" placeholder="Untitled Diagram">
      <button class="diagram-type-badge" id="diagram-type-badge" title="Click to switch diagram type">FLOWCHART</button>
    </div>

    <div class="diagram-header-center">
      <!-- Tool buttons -->
      <div class="tool-group">
        <button class="tool-btn active" data-tool="select" title="Select (V)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m5 3 14 9-7 1-4 7z"/></svg>
        </button>
        <button class="tool-btn" data-tool="connect" title="Connect (C)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
        <button class="tool-btn" data-tool="pan" title="Pan (Space)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 9c0-1.1.9-2 2-2h10a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2z"/><path d="M9 9V5a2 2 0 0 1 4 0v4"/></svg>
        </button>
      </div>

      <div style="width:1px;height:24px;background:var(--border)"></div>

      <!-- Zoom -->
      <div class="tool-group">
        <button class="tool-btn" id="btn-zoom-out" title="Zoom Out (-)">−</button>
        <span class="zoom-display" id="zoom-display">100%</span>
        <button class="tool-btn" id="btn-zoom-in" title="Zoom In (+)">+</button>
        <button class="tool-btn" id="btn-zoom-fit" title="Fit to Screen">⊡</button>
      </div>
    </div>

    <div class="diagram-header-right">
      <div class="dropdown" style="position:relative">
        <button class="btn btn-ghost btn-sm" id="diagram-user-btn" style="gap:6px">
          <div class="avatar" id="diagram-user-avatar" style="width:22px;height:22px;background:var(--accent);font-size:10px;font-weight:700;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center">?</div>
          <span id="diagram-user-name">...</span> ▾
        </button>
        <div class="dropdown-menu" id="diagram-user-dropdown" style="right:0;left:auto;min-width:180px">
          <div style="padding:8px 12px 6px;font-size:11px;color:var(--text-muted);border-bottom:1px solid var(--border);margin-bottom:4px" id="diagram-user-email"></div>
          <button class="dropdown-item" id="btn-diagram-logout"></button>
        </div>
      </div>
      <button class="btn btn-ghost btn-sm" id="btn-share">Share Link</button>
      <button class="btn btn-ghost btn-sm" id="btn-export-json">Export JSON</button>
      <button class="btn btn-ghost btn-sm" id="btn-export">Export SVG</button>
      <button class="btn btn-primary btn-sm" id="btn-save-diagram">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Save
      </button>
    </div>
  </header>

  <div class="diagram-layout">

    <!-- ── Left Panel: Node Palette ──────────────────────── -->
    <aside class="diagram-sidebar">
      <div class="palette-section" id="palette-flowchart">
        <div class="palette-title">Flowchart Shapes</div>
        <div class="palette-grid">
          <div class="palette-item" draggable="true" data-type="start">
            <svg viewBox="0 0 80 40"><rect x="2" y="2" width="76" height="36" rx="18" fill="#22d3a0" fill-opacity="0.15" stroke="#22d3a0" stroke-width="2"/><text x="40" y="25" text-anchor="middle" fill="#22d3a0" font-size="12" font-weight="600">Start</text></svg>
            <span>Start</span>
          </div>
          <div class="palette-item" draggable="true" data-type="end">
            <svg viewBox="0 0 80 40"><rect x="2" y="2" width="76" height="36" rx="18" fill="#f87171" fill-opacity="0.15" stroke="#f87171" stroke-width="2"/><text x="40" y="25" text-anchor="middle" fill="#f87171" font-size="12" font-weight="600">End</text></svg>
            <span>End</span>
          </div>
          <div class="palette-item" draggable="true" data-type="process">
            <svg viewBox="0 0 80 40"><rect x="2" y="2" width="76" height="36" rx="6" fill="#7c6af0" fill-opacity="0.15" stroke="#7c6af0" stroke-width="2"/><text x="40" y="25" text-anchor="middle" fill="#7c6af0" font-size="12" font-weight="600">Process</text></svg>
            <span>Process</span>
          </div>
          <div class="palette-item" draggable="true" data-type="decision">
            <svg viewBox="0 0 80 50"><polygon points="40,3 77,25 40,47 3,25" fill="#fbbf24" fill-opacity="0.15" stroke="#fbbf24" stroke-width="2"/><text x="40" y="30" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">Decision</text></svg>
            <span>Decision</span>
          </div>
          <div class="palette-item" draggable="true" data-type="io">
            <svg viewBox="0 0 80 40"><polygon points="12,2 78,2 68,38 2,38" fill="#60a5fa" fill-opacity="0.15" stroke="#60a5fa" stroke-width="2"/><text x="40" y="25" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="600">I/O</text></svg>
            <span>I/O</span>
          </div>
          <div class="palette-item" draggable="true" data-type="connector">
            <svg viewBox="0 0 50 50"><circle cx="25" cy="25" r="22" fill="#fb923c" fill-opacity="0.15" stroke="#fb923c" stroke-width="2"/><text x="25" y="30" text-anchor="middle" fill="#fb923c" font-size="11" font-weight="600">⬤</text></svg>
            <span>Circle</span>
          </div>
        </div>
      </div>

      <div class="palette-section" id="palette-er" style="display:none">
        <div class="palette-title">ER Elements</div>
        <div class="palette-grid">
          <div class="palette-item" draggable="true" data-type="er-table">
            <svg viewBox="0 0 80 60">
              <rect x="2" y="2" width="76" height="56" rx="4" fill="#7c6af0" fill-opacity="0.1" stroke="#7c6af0" stroke-width="2"/>
              <rect x="2" y="2" width="76" height="20" rx="4" fill="#7c6af0" fill-opacity="0.3"/>
              <text x="40" y="17" text-anchor="middle" fill="#f4f4f8" font-size="11" font-weight="700">Table</text>
              <line x1="2" y1="32" x2="78" y2="32" stroke="#7c6af0" stroke-width="1" stroke-opacity="0.5"/>
              <text x="10" y="45" fill="#a8a8c0" font-size="9">🔑 id: UUID</text>
              <text x="10" y="56" fill="#a8a8c0" font-size="9">  name: TEXT</text>
            </svg>
            <span>Table</span>
          </div>
        </div>
        <div class="palette-title" style="margin-top:12px">Relationships</div>
        <div style="display:flex;flex-direction:column;gap:6px;margin-top:4px">
          <button class="rel-btn active" data-rel="one-to-many">1 — N (One to Many)</button>
          <button class="rel-btn" data-rel="many-to-many">N — M (Many to Many)</button>
          <button class="rel-btn" data-rel="one-to-one">1 — 1 (One to One)</button>
        </div>
      </div>

      <!-- Properties Panel -->
      <div class="palette-section" id="properties-panel" style="display:none">
        <div class="palette-title">Properties</div>
        <div id="properties-content"></div>
      </div>
    </aside>

    <!-- ── Canvas ────────────────────────────────────────── -->
    <div class="diagram-canvas-wrapper" id="canvas-wrapper">
      <svg id="diagram-svg" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#6a6a88"/>
          </marker>
          <marker id="arrow-selected" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#7c6af0"/>
          </marker>
          <marker id="arrow-1" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#6a6a88"/>
          </marker>
          <pattern id="grid-pattern" width="20" height="20" patternUnits="userSpaceOnUse">
            <circle cx="0" cy="0" r="0.8" fill="#2e2e4a"/>
            <circle cx="20" cy="0" r="0.8" fill="#2e2e4a"/>
            <circle cx="0" cy="20" r="0.8" fill="#2e2e4a"/>
            <circle cx="20" cy="20" r="0.8" fill="#2e2e4a"/>
          </pattern>
        </defs>
        <!-- Background grid -->
        <rect id="svg-bg" width="100%" height="100%" fill="url(#grid-pattern)"/>
        <!-- Diagram layers -->
        <g id="diagram-layer">
          <g id="edges-layer"></g>
          <g id="nodes-layer"></g>
          <path id="temp-edge" style="display:none" fill="none" stroke="#7c6af0" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-selected)"/>
        </g>
      </svg>

      <!-- Context menu -->
      <div id="ctx-menu" style="display:none">
        <button class="ctx-item" id="ctx-delete">🗑 Delete</button>
        <button class="ctx-item" id="ctx-duplicate">⊕ Duplicate</button>
        <div class="ctx-divider"></div>
        <button class="ctx-item" id="ctx-bring-front">⬆ Bring to Front</button>
      </div>

      <!-- Keyboard hints -->
      <div class="canvas-hints">
        V: Select · C: Connect · Del: Delete · Scroll: Zoom · Drag: Pan
      </div>
    </div>

  </div>

  <!-- ER Column Editor Modal -->
  <div class="modal-backdrop" id="modal-er-columns">
    <div class="modal">
      <div class="modal-header">
        <h3>Edit Table Columns</h3>
        <button class="modal-close" data-close="modal-er-columns">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Table Name</label>
          <input type="text" class="input" id="er-table-name" placeholder="users">
        </div>
        <div class="form-group">
          <label class="form-label">Columns</label>
          <div id="er-columns-list"></div>
          <button class="btn btn-secondary btn-sm" id="btn-add-column" style="margin-top:8px">+ Add Column</button>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" data-close="modal-er-columns">Cancel</button>
        <button class="btn btn-primary" id="btn-save-er-table">Save</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/diagram.js"></script>
</body>
</html>
