<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Tasks – TaskFlow Kanban Board</title>
  <meta name="description" content="Manage your tasks on a drag-and-drop kanban board with lists, priorities, due dates, assignees, comments and real-time sync.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://taskflow-gules-iota.vercel.app/tasks.html">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://taskflow-gules-iota.vercel.app/tasks.html">
  <meta property="og:site_name" content="TaskFlow">
  <meta property="og:title" content="TaskFlow Tasks – Kanban Board">
  <meta property="og:description" content="Drag-and-drop kanban tasks with lists, priorities, assignees and comments.">

  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://code.jquery.com" crossorigin>
  <link rel="dns-prefetch" href="https://wxoxwmsuquhltlyebvje.supabase.co">

  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('taskflow_theme') || 'dark');</script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">

  <!-- ── Sidebar ───────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <button class="workspace-switcher" id="ws-switcher" data-tooltip="Switch workspace" aria-label="Switch workspace">
        <div class="workspace-icon" id="ws-icon">T</div>
        <span class="workspace-name" id="ws-name">Loading...</span>
        <span class="workspace-chevron">▾</span>
      </button>
      <div class="ws-dropdown" id="ws-dropdown">
        <div id="ws-list"></div>
        <div class="divider"></div>
        <button class="ws-item" id="btn-new-workspace" data-tooltip="Create a new workspace">
          <span>＋</span> New Workspace
        </button>
        <button class="ws-item" id="btn-join-workspace" data-tooltip="Join a workspace with a team code">
          <span>🔗</span> Join Workspace
        </button>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="sidebar-section">
        <div class="sidebar-section-title">Main</div>
        <a class="nav-item" href="dashboard.html" data-tooltip="Dashboard overview & stats">
          <span class="nav-icon">🏠</span> <span>Overview</span>
        </a>
        <a class="nav-item active" href="tasks.html" data-tooltip="View and manage tasks">
          <span class="nav-icon">✅</span> <span>Tasks</span>
          <span class="nav-badge" id="badge-todos" style="display:none"></span>
        </a>
        <a class="nav-item" href="dashboard.html#diagrams" data-tooltip="View and create diagrams">
          <span class="nav-icon">🗺️</span> <span>Diagrams</span>
        </a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-title">Workspace</div>
        <a class="nav-item" href="dashboard.html#team" data-tooltip="Manage team members">
          <span class="nav-icon">👥</span> <span>Team</span>
        </a>
        <a class="nav-item" href="dashboard.html#settings" data-tooltip="Workspace settings">
          <span class="nav-icon">⚙️</span> <span>Settings</span>
        </a>
      </div>
      <div class="sidebar-collapse-section">
        <button class="nav-item sidebar-collapse-btn" id="btn-toggle-sidebar" data-tooltip="Collapse sidebar">
          <span class="nav-icon">◀</span>
          <span>Collapse</span>
        </button>
      </div>
    </nav>

    <div class="sidebar-bottom">
      <div class="dropdown">
        <button class="user-menu" id="user-menu-btn" data-tooltip="Account menu">
          <div class="avatar" id="user-avatar" style="width:28px;height:28px;background:var(--accent);font-size:12px;font-weight:700;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center">?</div>
          <div class="user-info">
            <div style="color:#fff" class="user-name" id="user-display-name">Loading...</div>
            <div class="user-email" id="user-email-display"></div>
          </div>
          <span class="user-menu-chevron">▾</span>
        </button>
        <div class="dropdown-menu" id="user-dropdown">
          <button class="dropdown-item" id="btn-theme-toggle">
            <span class="theme-toggle-icon">🌙</span> <span class="theme-toggle-label">Light Mode</span>
          </button>
          <div class="divider"></div>
          <button class="dropdown-item" id="btn-logout">
            <span>🚪</span> Sign Out
          </button>
        </div>
      </div>
    </div>
  </aside>

  <!-- Backdrop for the mobile sidebar drawer -->
  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

  <!-- ── Main ──────────────────────────────────────────────── -->
  <div class="app-main">

    <!-- Header -->
    <header class="app-header">
      <button class="mobile-menu-btn" id="btn-mobile-menu" aria-label="Open menu">☰</button>
      <span class="header-title" id="panel-title">Tasks</span>
      <div class="header-actions" id="header-actions"></div>
    </header>

    <!-- Content -->
    <div class="app-content">

      <!-- ── Tasks Panel ─────────────────────────────────────── -->
      <div class="panel active" id="panel-todos">
        <div class="kanban-header">
          <div>
            <h2 style="font-size:18px;margin-bottom:4px">Tasks</h2>
            <div class="list-selector" id="list-selector">
              <button class="list-chip active" data-list="all" data-tooltip="Show tasks from all lists">All Lists</button>
            </div>
          </div>
          <div class="kanban-controls">
            <button class="btn btn-ghost btn-sm" id="btn-export-todos" data-tooltip="Export tasks as JSON">↓ Export</button>
            <button class="btn btn-ghost btn-sm" id="btn-import-todos" data-tooltip="Import tasks from JSON">↑ Import</button>
            <input type="file" id="input-import-todos" accept=".json" style="display:none">
            <button class="btn btn-secondary btn-sm" id="btn-new-list" data-tooltip="Create a new task list">+ New List</button>
            <button class="btn btn-primary btn-sm" id="btn-new-todo" data-tooltip="Add a new task">+ Add Task</button>
          </div>
        </div>
        <div class="kanban-board" id="kanban-board">
          <div class="kanban-col" data-status="todo">
            <div class="kanban-col-header">
              <div class="kanban-col-title">
                <span class="col-dot" style="background:var(--text-3)"></span>
                Todo
                <span class="col-count" id="count-todo">0</span>
              </div>
            </div>
            <div class="kanban-col-body" id="col-todo"></div>
            <button class="kanban-col-add" data-status="todo" id="add-todo-btn" data-tooltip="Add task to Todo">＋ Add task</button>
          </div>
          <div class="kanban-col" data-status="in_progress">
            <div class="kanban-col-header">
              <div class="kanban-col-title">
                <span class="col-dot" style="background:var(--blue)"></span>
                In Progress
                <span class="col-count" id="count-in_progress">0</span>
              </div>
            </div>
            <div class="kanban-col-body" id="col-in_progress"></div>
            <button class="kanban-col-add" data-status="in_progress" data-tooltip="Add task to In Progress">＋ Add task</button>
          </div>
          <div class="kanban-col" data-status="done">
            <div class="kanban-col-header">
              <div class="kanban-col-title">
                <span class="col-dot" style="background:var(--green)"></span>
                Done
                <span class="col-count" id="count-done">0</span>
              </div>
            </div>
            <div class="kanban-col-body" id="col-done"></div>
            <button class="kanban-col-add" data-status="done" data-tooltip="Add task to Done">＋ Add task</button>
          </div>
        </div>
      </div>

    </div><!-- /app-content -->
  </div><!-- /app-main -->
</div><!-- /app-layout -->

<!-- ══════════════════════════════════════════════════════════ -->
<!-- MODALS                                                      -->
<!-- ══════════════════════════════════════════════════════════ -->

<!-- New Workspace -->
<div class="modal-backdrop" id="modal-new-workspace">
  <div class="modal">
    <div class="modal-header">
      <h3>Create Workspace</h3>
      <button class="modal-close" data-close="modal-new-workspace" data-tooltip="Close">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Workspace Name</label>
        <input type="text" class="input" id="new-ws-name" placeholder="My Team">
      </div>
      <div class="form-group">
        <label class="form-label">Description (optional)</label>
        <textarea class="textarea" id="new-ws-desc" placeholder="What does this workspace do?"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-close="modal-new-workspace">Cancel</button>
      <button class="btn btn-primary" id="btn-create-workspace">Create Workspace</button>
    </div>
  </div>
</div>

<!-- New List -->
<div class="modal-backdrop" id="modal-new-list">
  <div class="modal">
    <div class="modal-header">
      <h3>Create List</h3>
      <button class="modal-close" data-close="modal-new-list" data-tooltip="Close">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">List Name</label>
        <input type="text" class="input" id="new-list-name" placeholder="e.g. Backend, Design, Marketing">
      </div>
      <div class="form-group">
        <label class="form-label">Color</label>
        <div class="color-picker" id="list-color-picker">
          <div class="color-swatch selected" data-color="#6366f1" style="background:#6366f1"></div>
          <div class="color-swatch" data-color="#8b5cf6" style="background:#8b5cf6"></div>
          <div class="color-swatch" data-color="#ec4899" style="background:#ec4899"></div>
          <div class="color-swatch" data-color="#f59e0b" style="background:#f59e0b"></div>
          <div class="color-swatch" data-color="#10b981" style="background:#10b981"></div>
          <div class="color-swatch" data-color="#3b82f6" style="background:#3b82f6"></div>
          <div class="color-swatch" data-color="#ef4444" style="background:#ef4444"></div>
          <div class="color-swatch" data-color="#14b8a6" style="background:#14b8a6"></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-close="modal-new-list">Cancel</button>
      <button class="btn btn-primary" id="btn-create-list">Create List</button>
    </div>
  </div>
</div>

<!-- New Todo -->
<div class="modal-backdrop" id="modal-new-todo">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3>Add Task</h3>
      <button class="modal-close" data-close="modal-new-todo" data-tooltip="Close">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Task Title</label>
        <input type="text" class="input" id="todo-title" placeholder="What needs to be done?">
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="textarea" id="todo-desc" placeholder="Add details..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">List</label>
          <select class="select" id="todo-list"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="select" id="todo-status">
            <option value="todo">Todo</option>
            <option value="in_progress">In Progress</option>
            <option value="done">Done</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Priority</label>
          <select class="select" id="todo-priority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
            <option value="urgent">Urgent</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Due Date</label>
          <input type="date" class="input" id="todo-due">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Assign To</label>
        <select class="select" id="todo-assignee">
          <option value="">Unassigned</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-close="modal-new-todo">Cancel</button>
      <button class="btn btn-primary" id="btn-create-todo">Add Task</button>
    </div>
  </div>
</div>

<!-- Todo Detail -->
<div class="modal-backdrop" id="modal-todo-detail">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3>Task Details</h3>
      <div style="display:flex;gap:8px">
        <button class="btn btn-danger btn-sm" id="btn-delete-todo" data-tooltip="Permanently delete this task">Delete</button>
        <button class="modal-close" data-close="modal-todo-detail" data-tooltip="Close without saving">✕</button>
      </div>
    </div>
    <div class="modal-body">
      <input type="hidden" id="detail-todo-id">
      <div class="form-group">
        <label class="form-label">Title</label>
        <input type="text" class="input" id="detail-title">
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="textarea" id="detail-desc" style="min-height:100px"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="select" id="detail-status">
            <option value="todo">Todo</option>
            <option value="in_progress">In Progress</option>
            <option value="done">Done</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Priority</label>
          <select class="select" id="detail-priority">
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
            <option value="urgent">Urgent</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Due Date</label>
          <input type="date" class="input" id="detail-due">
        </div>
        <div class="form-group">
          <label class="form-label">Assign To</label>
          <select class="select" id="detail-assignee">
            <option value="">Unassigned</option>
          </select>
        </div>
      </div>
      <div class="form-group" id="comments-section">
        <label class="form-label">Comments</label>
        <div id="comments-list" class="comments-list"></div>
        <div class="comment-input-row">
          <input type="text" class="input" id="comment-input" placeholder="Write a comment…" autocomplete="off">
          <button class="btn btn-primary btn-sm" id="btn-add-comment">Post</button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-close="modal-todo-detail">Cancel</button>
      <button class="btn btn-primary" id="btn-save-todo">Save Changes</button>
    </div>
  </div>
</div>

<!-- Join Workspace by Code -->
<div class="modal-backdrop" id="modal-join-workspace">
  <div class="modal">
    <div class="modal-header">
      <h3>Join a Workspace</h3>
      <button class="modal-close" data-close="modal-join-workspace" data-tooltip="Close">✕</button>
    </div>
    <div class="modal-body">
      <p style="font-size:13px;color:var(--text-2);margin-bottom:16px">Enter the 6-character code shared by your team admin.</p>
      <div class="form-group">
        <label class="form-label">Team Join Code</label>
        <input type="text" class="input" id="join-ws-code-input" placeholder="ABC123" maxlength="6"
          style="text-transform:uppercase;letter-spacing:6px;font-size:22px;text-align:center;font-weight:700">
      </div>
      <div id="join-ws-feedback" style="display:none;font-size:13px;padding:6px 0;color:var(--red)"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" data-close="modal-join-workspace">Cancel</button>
      <button class="btn btn-primary" id="btn-submit-join-ws">Join Workspace</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/config.js"></script>
<script src="js/team.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
